name: Windows EXE 빌드 & 릴리스

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: 앱 아이콘 생성 (마젠타 문서+채팅버블)
        run: python make_icon.py

      - name: ffmpeg 설치
        run: |
          choco install ffmpeg -y
          ffmpeg -version

      - name: EXE 빌드 (PyInstaller)
        run: |
          pyinstaller --onefile --windowed `
            --name "회의녹음요약" `
            --icon app_icon.ico `
            --add-data "app_dist/config.py;." `
            --add-data "app_dist/database.py;." `
            --add-data "app_dist/recorder.py;." `
            --add-data "app_dist/gemini_service.py;." `
            --add-data "app_dist/clova_service.py;." `
            --add-data "app_dist/file_manager.py;." `
            --add-data "app_dist/google_drive.py;." `
            --hidden-import "requests" `
            --hidden-import "anthropic" `
            --hidden-import "google.auth" `
            --hidden-import "google.auth.transport.requests" `
            --hidden-import "google_auth_oauthlib.flow" `
            --hidden-import "googleapiclient.discovery" `
            --hidden-import "googleapiclient.http" `
            --hidden-import "googleapiclient.errors" `
            app_dist/main.py

      - name: 코드 서명 인증서 생성 및 EXE 서명
        run: |
          # 자체 서명 코드사이닝 인증서 생성 (5년 유효)
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=회의녹음요약, O=K-Run Ventures, C=KR" `
            -KeySpec Signature `
            -KeyUsage DigitalSignature `
            -FriendlyName "K-Run Ventures Code Signing" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -NotAfter (Get-Date).AddYears(5) `
            -HashAlgorithm SHA256

          # PFX (서명용)
          $pwd = ConvertTo-SecureString -String "KRunSigning2026!" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath "codesign.pfx" -Password $pwd | Out-Null

          # CER (배포용 — 사용자가 한 번 설치하면 경고 없음)
          Export-Certificate -Cert $cert -FilePath "dist\KRunVentures_인증서.cer" | Out-Null

          # signtool 경로 자동 탐색
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" `
            -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "x64" } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) {
            Write-Host "signtool 대체 경로 탐색..."
            $signtool = Get-ChildItem -Path "C:\Program Files\Windows Kits" `
              -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue |
              Select-Object -First 1 -ExpandProperty FullName
          }

          Write-Host "signtool 경로: $signtool"

          # EXE 서명
          & $signtool sign `
            /f codesign.pfx `
            /p "KRunSigning2026!" `
            /fd SHA256 `
            /td SHA256 `
            /tr http://timestamp.digicert.com `
            /d "회의녹음요약 by K-Run Ventures" `
            "dist\회의녹음요약.exe"

          Write-Host "✅ 코드 서명 완료"

      - name: 서명 검증
        run: |
          # 자체 서명 인증서이므로 /pa 대신 파일 존재 및 크기로 검증
          if (Test-Path "dist\회의녹음요약.exe") {
            $size = [math]::Round((Get-Item "dist\회의녹음요약.exe").Length/1MB, 1)
            Write-Host "✅ EXE 빌드 확인: ${size} MB"
          } else {
            Write-Error "EXE 파일이 없습니다"
            exit 1
          }
          if (Test-Path "dist\KRunVentures_인증서.cer") {
            Write-Host "✅ 인증서 파일 확인 완료"
          } else {
            Write-Error "인증서 파일이 없습니다"
            exit 1
          }

      - name: Artifact 업로드 (EXE + 인증서)
        uses: actions/upload-artifact@v4
        with:
          name: 회의녹음요약-windows-exe
          path: |
            dist/회의녹음요약.exe
            dist/KRunVentures_인증서.cer
          retention-days: 30

      - name: GitHub Release 생성 (태그 push 시)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "회의녹음요약 ${{ github.ref_name }}"
          body: |
            ## 회의녹음요약 ${{ github.ref_name }}

            ### 📥 설치 방법

            **Step 1 — 인증서 설치 (최초 1회, SmartScreen 해제)**
            1. `KRunVentures_인증서.cer` 다운로드 → 더블클릭
            2. **인증서 설치** → **로컬 컴퓨터** → **다음**
            3. **모든 인증서를 다음 저장소에 저장** 선택
            4. **찾아보기** → **신뢰할 수 있는 게시자** 선택 → **확인** → **다음** → **마침**

            **Step 2 — 앱 실행**
            1. `회의녹음요약.exe` 다운로드 → 더블클릭 실행
            2. 설정 탭에서 API 키 입력 후 사용

            ### 🔑 필요 API 키
            - **CLOVA Speech** (STT 권장): [NAVER Cloud Console](https://console.ncloud.com)
            - **Gemini** (요약 필수): [Google AI Studio](https://aistudio.google.com/apikey)

            ### 📖 전체 사용법
            [MANUAL.md](https://github.com/${{ github.repository }}/blob/master/MANUAL.md) 참고
          files: |
            dist/회의녹음요약.exe
            dist/KRunVentures_인증서.cer
          draft: false
          prerelease: false
